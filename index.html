<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lobster&family=Bebas+Neue&family=Caveat&family=Shrikhand&family=Graduate&family=Sigmar&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Almendra:wght@700&display=swap');

        body {
            background-color: #1a1a1a;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #download-wrapper {
            background-color: white; 
            padding: 3vw;
            display: block; 
            width: fit-content;
            margin: 0 auto;
        }

        #capture-area {
            width: 90vw;
            min-height: 90vw;
            background: radial-gradient(circle, #eee 10%, #bdbdbd 100%);
            border-radius: 12vw;
            padding: 10vw;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            border: 1px solid transparent; 
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 0.3vw;
            margin-bottom: 3vw;
        }

        .avatar-container {
            width: 17vw;
            height: 16vw;
            cursor: pointer; /* Menandakan bisa diklik */
        }

        .avatar-img {
            width: 17vw;
            height: 17vw;
            aspect-ratio: 1 / 1; 
            object-fit: cover;
            border-radius: 50%;
            display: block;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 7vw;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .verified-badge {
            width: 6vw;
            height: 6vw;
            margin-left:0.5vw;
            margin-top:-3vw;
            filter: drop-shadow(2px 2px 2px rgba(131,131,131,0.5));
        }

        .handle {
            font-size: 1vw;
            color: #333;
            font-family: Monospace;
            font-weight: 900;
            margin: 0;
        }
        
        .quote-container {
            flex-grow: 1;
            margin-top: 3vw;
            padding-bottom: 2vw;
        }

        .quote-text {
            font-family: 'Almendra', serif;
            font-size: 7vw;
            line-height: 1.2;
            color: #000;
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            resize: none;
            text-align: left;
            word-wrap: break-word;
        }

        .watermark {
            position: absolute;
            bottom: 8vw;
            right: 8vw;
            font-size: 2vw;
            color: rgba(0, 0, 0, 0.4); 
            font-family: Monospace;
            font-weight: bold;
            text-transform: lowercase;
        }

        .style-controls {
            margin-top: 3vw;
            display: flex;
            gap: 2vw;
            flex-wrap: wrap;
            justify-content: center;
              -webkit-tap-highlight-color: transparent; 
        }

          select, .file-input-label {
              padding: 2vw;
              border-radius: 2vw;
              background: #333;
              color: white;
              border: 0.5vw solid #444;
              cursor: pointer;
              font-size: 2.8vw;
              transition: transform 0.1s ease, opacity 0.1s ease;
              -webkit-tap-highlight-color: transparent;
              user-select: none;
              outline: none;
              
              /* Tambahkan ini untuk menstabilkan ukuran di desktop */
              min-width: fit-content;
              appearance: none; 
              -webkit-appearance: none;
              background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
              background-repeat: no-repeat;
              background-position: right 2vw center;
              background-size: 4vw;
              padding-right: 8vw;
          }
          
          @media (min-width: 1024px) {
              select, .file-input-label {
                  font-size: 16px;
                  padding: 10px 30px 10px 15px;
                  border-radius: 8px;
                  border-width: 2px;
                  background-size: 12px;
                  background-position: right 10px center;
              }
          }
          
          select:hover, .file-input-label:hover {
              opacity: 0.8;
          }
          
          select:active, .file-input-label:active {
              transform: scale(1.1);
          }

        .controls {
            margin-top: 2vw;
            display: flex;
            gap: 2vw;
        }

        button {
            padding: 3vw 11.8vw;
            border-radius: 2vw;
            border: none;
            cursor: pointer;
            font-size: 3.7vw;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-reset { background: #444; color: white; }
        .btn-save { background: #2563eb; color: white; }
        
          button {
              transition: transform 0.1s ease;
              -webkit-tap-highlight-color: transparent; 
              user-select: none;
              outline: none;
          }
          
          button:hover {
              opacity: 0.8;
          }
          
          button:active {
              transform: scale(1.1); 
          }
          
          #file-input { 
              display: none; 
          }
          .quote-container {
              flex-grow: 1;
              margin-top: 4vw;
              padding-bottom: 10vw; 
                }
                
          .quote-title {
              font-family: 'Bebas Neue', sans-serif; 
              font-size: 5vw;
              color: #333;
              text-transform: uppercase; 
              letter-spacing: 1px;
              margin-bottom: 5px;
              outline: none;
              white-space: pre-wrap;
          }
          
          
          .quote-text {
              font-family: 'Almendra', serif;
              font-size: 28px;
              line-height: 1.2;
              color: #000;
              border: none;
              background: transparent;
              width: 100%;
              outline: none;
              resize: none;
              word-wrap: break-word;
          
              /* Solusi Utama */
              text-align: left !important;
              white-space: pre-wrap;
              display: inline-block; /* Memastikan kontainer membungkus teks dengan benar */
          }
    </style>
</head>
<body>

    <div id="download-wrapper">
        <div id="capture-area">
            <div class="profile-section">
                <!-- Klik foto untuk ganti -->
                <label for="file-input" class="avatar-container">
                    <img id="profile-pic" src="https://i.postimg.cc/XJ4ZRQqY/Screenshot-20260504-125634-jpg-(1).png" class="avatar-img" alt="avatar">
                </label>
                <input type="file" id="file-input" accept="image/*" onchange="loadPhoto(event)">
                
                <div class="user-info">
                    <h2 class="username" contenteditable="true">Tommy<a style="margin-top:-3vw; font-size:3vw;">𝁇S27</a> <img src="https://img.icons8.com/color/80/verified-badge.png" class="verified-badge"></h2>
                    <p class="handle" contenteditable="true" style="font-size:2.1vw;">@stories_tom.com</p>
                </div>
            </div>

<div class="quote-container">
    <!-- Elemen Judul Baru -->
    <div class="quote-title" contenteditable="true" id="title-input">JUDUL QUOTE</div>
    
    <!-- Elemen Isi (Tetap) -->
    <div class="quote-text" contenteditable="true" id="quote-input" style="font-size:7vw;">Jangan dengerin omongan orang yang gak ngasih kita makan.</div>
    
    <div class="watermark">tommy-app.com  🐞</div>
</div>
        </div>
    </div>

<div class="style-controls">
    <select id="font-select" onchange="changeFontStyle()">
        <option value="'Almendra', serif">Gaya Almendra</option>
        <option value="'UnifrakturMaguntia', cursive">Gaya Gothic</option>
        <option value="'Arial', sans-serif">Gaya Clean (Arial)</option>
        <option value="'Monospace'">Gaya Kode</option>
        
        <!-- Tambahan dari Gambar -->
        <option value="'Shrikhand', display">Gaya Shrikhand</option>
        <option value="'Graduate', serif">Gaya Graduate</option>
        <option value="'Sigmar', display">Gaya Sigmar</option>
        
        <!-- Tambahan Pilihan -->
        <option value="'Playfair Display', serif">Gaya Elegan</option>
        <option value="'Lobster', cursive">Gaya Artistik</option>
        <option value="'Bebas Neue', sans-serif">Gaya Tegas</option>
        <option value="'Caveat', cursive">Gaya Tulis Tangan</option>
        <option value="'Georgia', serif">Gaya Klasik</option>
    </select>

        <select id="size-select" onchange="changeFontSize()">
            <option value="5vw">Kecil</option>
            <option value="7vw" selected>Normal</option>
            <option value="8vw">Besar</option>
            <option value="9vw">Extra Besar</option>
        </select>
        
        <label for="file-input" class="file-input-label">Ganti Foto Profil</label>
    </div>

    <div class="controls">
        <button class="btn-reset" onclick="resetPage()">Reset Teks</button>
        <button class="btn-save" onclick="downloadImage()">Simpan Gambar</button>
    </div>

<script>
// Fungsi Ganti Foto
function loadPhoto(event) {
    const reader = new FileReader();
    reader.onload = function() {
        const output = document.getElementById('profile-pic');
        output.src = reader.result;
    };
    reader.readAsDataURL(event.target.files[0]);
}

function changeFontStyle() {
    const font = document.getElementById('font-select').value;
    document.getElementById('quote-input').style.fontFamily = font;
}

function changeFontSize() {
    const size = document.getElementById('size-select').value;
    document.getElementById('quote-input').style.fontSize = size;
}

function resetPage() {
    // Reset Isi
    const quote = document.getElementById('quote-input');
    quote.innerText = "Jangan dengerin omongan orang yang gak ngasih kita makan.";
    quote.style.fontFamily = "'Almendra', serif";
    quote.style.fontSize = "7vw";

    // Reset Judul Baru
    const title = document.getElementById('title-input');
    title.innerText = "JUDUL QUOTE";
    
    // ... sisa kode reset lainnya ...
}

function downloadImage() {
    const area = document.getElementById('download-wrapper');
    const titleInput = document.getElementById('title-input');
    const quoteInput = document.getElementById('quote-input');

    document.fonts.ready.then(() => {
        html2canvas(area, {
            useCORS: true,
            scale: 4,
            backgroundColor: "#ffffff",
            onclone: (clonedDoc) => {
                const clonedTitle = clonedDoc.getElementById('title-input');
                const clonedQuote = clonedDoc.getElementById('quote-input');
                
                // Pastikan spasi terjaga di kedua elemen saat disimpan
                clonedTitle.innerText = titleInput.innerText;
                clonedTitle.style.whiteSpace = "pre-wrap";
                
                clonedQuote.innerText = quoteInput.innerText;
                clonedQuote.style.whiteSpace = "pre-wrap";
            }
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'quote-tom-' + Date.now() + '.png';
            link.href = canvas.toDataURL("image/png", 1.0);
            link.click();
        });
    });
}
</script>
</body>
</html>
